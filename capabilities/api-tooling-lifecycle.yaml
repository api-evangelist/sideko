naftiko: 1.0.0-alpha2
info:
  label: Sideko — API Tooling Lifecycle
  description: >-
    Unified Sideko workflow covering the full API tooling lifecycle: ingest
    an OpenAPI version, lint it, generate SDKs (Python/TypeScript/Java/Go/C#/Rust),
    generate an MCP server, deploy a mock server, and publish the documentation
    site. Composes the per-API capabilities (api-projects, linting,
    sdk-generation, mcp-generation, mock-servers, documentation, authentication).
  tags:
  - Sideko
  - API Tooling
  - SDK Generation
  - MCP Generation
  - Documentation
  - Mock Servers
  - Workflow
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    SIDEKO_API_KEY: SIDEKO_API_KEY
capability:
  consumes:
  - type: http
    namespace: sideko-lifecycle
    baseUri: https://api.sideko.dev/v1
    description: Composite consume surface stitching every Sideko lifecycle step.
    resources:
    - name: api-projects
      path: /api-projects
      operations:
      - name: createapiproject
        method: POST
        description: Create API Project
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-versions
      path: /api-projects/{projectId}/versions
      operations:
      - name: createapiversion
        method: POST
        description: Create API Version
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lint
      path: /api-projects/{projectId}/lint
      operations:
      - name: lintapiproject
        method: POST
        description: Lint API Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sdks
      path: /api-projects/{projectId}/sdks
      operations:
      - name: triggersdkgeneration
        method: POST
        description: Trigger SDK Generation
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mcps
      path: /api-projects/{projectId}/mcps
      operations:
      - name: triggermcpgeneration
        method: POST
        description: Trigger MCP Generation
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mock-servers
      path: /api-projects/{projectId}/mock-servers
      operations:
      - name: deploymockserver
        method: POST
        description: Deploy Mock Server
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: docs
      path: /api-projects/{projectId}/docs
      operations:
      - name: deploydocumentationsite
        method: POST
        description: Deploy Documentation Site
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-sideko-key
      value: '{{env.SIDEKO_API_KEY}}'
      placement: header
  exposes:
  - type: mcp
    namespace: sideko-lifecycle-mcp
    port: 9090
    transport: http
    description: MCP adapter exposing the full API tooling lifecycle as agent tools.
    tools:
    - name: create-api-project
      description: Create API Project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sideko-lifecycle.createapiproject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-api-version
      description: Upload a new OpenAPI version (auto-lints)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sideko-lifecycle.createapiversion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: lint-api-project
      description: Lint OpenAPI spec for generation readiness
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sideko-lifecycle.lintapiproject
      outputParameters:
      - type: object
        mapping: $.
    - name: trigger-sdk-generation
      description: Generate an SDK in Python, TypeScript, Java, Go, C#, or Rust
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sideko-lifecycle.triggersdkgeneration
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: trigger-mcp-generation
      description: Generate an MCP server from the OpenAPI version
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sideko-lifecycle.triggermcpgeneration
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: deploy-mock-server
      description: Deploy a mock server for the API version
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sideko-lifecycle.deploymockserver
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: deploy-documentation-site
      description: Deploy the documentation site for the API version
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sideko-lifecycle.deploydocumentationsite
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

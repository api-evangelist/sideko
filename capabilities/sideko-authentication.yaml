naftiko: 1.0.0-alpha2
info:
  label: Sideko API — Authentication
  description: 'Sideko API — Authentication. 3 operations. Lead operation: List API Keys. Self-contained Naftiko capability
    covering one Sideko business surface.'
  tags:
  - Sideko
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIDEKO_API_KEY: SIDEKO_API_KEY
capability:
  consumes:
  - type: http
    namespace: sideko-authentication
    baseUri: https://api.sideko.dev/v1
    description: Sideko API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: auth-api-keys
      path: /auth/api-keys
      operations:
      - name: listapikeys
        method: GET
        description: List API Keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createapikey
        method: POST
        description: Create API Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: auth-api-keys-keyId
      path: /auth/api-keys/{keyId}
      operations:
      - name: deleteapikey
        method: DELETE
        description: Delete API Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-sideko-key
      value: '{{env.SIDEKO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: sideko-authentication-rest
    port: 8080
    description: REST adapter for Sideko API — Authentication. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/auth/api-keys
      name: auth-api-keys
      description: REST surface for auth-api-keys.
      operations:
      - method: GET
        name: listapikeys
        description: List API Keys
        call: sideko-authentication.listapikeys
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapikey
        description: Create API Key
        call: sideko-authentication.createapikey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/api-keys/{keyid}
      name: auth-api-keys-keyid
      description: REST surface for auth-api-keys-keyId.
      operations:
      - method: DELETE
        name: deleteapikey
        description: Delete API Key
        call: sideko-authentication.deleteapikey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sideko-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sideko API — Authentication. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-api-keys
      description: List API Keys
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sideko-authentication.listapikeys
      outputParameters:
      - type: object
        mapping: $.
    - name: create-api-key
      description: Create API Key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sideko-authentication.createapikey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-api-key
      description: Delete API Key
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: sideko-authentication.deleteapikey
      outputParameters:
      - type: object
        mapping: $.

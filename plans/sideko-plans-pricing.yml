specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Sideko
providerId: sideko
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Tooling
  - SDK Generation
  - Documentation
  - Mock Servers
  - Platform
description: Sideko offers tiered SaaS plans for SDK generation, OpenAPI documentation, and mock servers.
  A free Starter tier covers a single SDK language (1-month trial) and 1 API. The Pro plan is billed
  annually at $400/month with additional SDK languages priced at $400/month each. Enterprise is custom.
sources:
  - https://sideko.dev/pricing
plans:
  - id: sideko-starter
    name: Starter
    type: freemium
    description: Free tier with 1 SDK language (1-month trial), 1 API, and 1 documentation project.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0/month'
        userMultiplied: false
      - label: SDK languages
        name: sdk_languages
        type: quota
        metric: sdk-language
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: included (1-month trial)
        userMultiplied: false
      - label: APIs included
        name: apis_included
        type: quota
        metric: api
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Documentation projects
        name: doc_projects
        type: quota
        metric: project
        limit: 1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: API Documentation Builder
      - name: OpenAPI Linting
      - name: Instant Mock Servers
      - name: Email Support
      - name: API Access
      - name: Spec Validation
      - name: Custom MDX Components
  - id: sideko-pro
    name: Pro
    type: subscription
    description: Annual-billed Pro plan with 2 SDK languages, 10 APIs, 5 doc projects, custom domains,
      and on-brand documentation. Additional SDK languages priced per-language.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$400/month (billed annually)'
        userMultiplied: false
      - label: SDK languages included
        name: sdk_languages
        type: quota
        metric: sdk-language
        limit: 2
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Additional SDK language
        name: additional_sdk_language
        type: metered
        metric: sdk-language
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$400/month each'
        userMultiplied: false
      - label: APIs included
        name: apis_included
        type: quota
        metric: api
        limit: 10
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Documentation projects
        name: doc_projects
        type: quota
        metric: project
        limit: 5
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Private Preview Deployments
      - name: SEO Optimizations
      - name: Custom Domains
      - name: On-brand Documentation (no Sideko watermark)
      - name: File Streaming
      - name: Retries with Backoff
      - name: Pagination Support
      - name: Slack Support
      - name: Scoped Service Accounts
  - id: sideko-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-priced enterprise tier with unlimited APIs, doc projects, and SDK languages,
      plus SSO, SLA, SOC 2 Type 2, RBAC, and Solutions Engineering.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: SDK languages
        name: sdk_languages
        type: quota
        metric: sdk-language
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: APIs included
        name: apis_included
        type: quota
        metric: api
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Documentation projects
        name: doc_projects
        type: quota
        metric: project
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: '"Match your Figma" API Documentation'
      - name: Private APIs and Generated CLIs
      - name: SSO
      - name: SLA
      - name: SOC 2 Type 2
      - name: Solutions Engineering Support
      - name: RBAC for APIs, SDKs, and Docs
      - name: Bundle APIs and SDKs
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

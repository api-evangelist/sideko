specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Sideko
providerId: sideko
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Tooling
  - SDK Generation
  - Documentation
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps for Sideko. Sideko bills as a tiered SaaS subscription (Starter free,
  Pro $400/month annual, Enterprise custom) with per-additional-SDK-language metered upsell at $400/month
  each. Quota dimensions are SDK languages, included APIs, and documentation projects.
sources:
  - https://sideko.dev/pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Sideko, Inc.
serviceCategory: Developer Tools
billingModel:
  pricingCategory: Tiered Subscription + Per-Language Upsell
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
focusColumns:
  ServiceName: Sideko
  ServiceCategory: Developer Tools
  ProviderName: Sideko
  PublisherName: Sideko, Inc.
  InvoiceIssuerName: Sideko, Inc.
  BillingCurrency: USD
meters:
  - name: subscription
    description: Monthly Sideko plan fee billed annually.
    unit: month
    aggregation: sum
    dimensions:
      - plan
  - name: sdk_language_upsell
    description: Per-additional-SDK-language fee on the Pro plan ($400/month each).
    unit: sdk-language
    aggregation: sum
    dimensions:
      - plan
      - language
  - name: apis_used
    description: Count of APIs onboarded against the plan ceiling (1 Starter, 10 Pro, unlimited Enterprise).
    unit: api
    aggregation: max
    dimensions:
      - plan
  - name: doc_projects_used
    description: Count of documentation projects against the plan ceiling.
    unit: project
    aggregation: max
    dimensions:
      - plan
principles:
  - name: Visibility
    description: Sideko spend is a known monthly subscription line; track via the company invoice and
      compare APIs/SDK languages onboarded against the Pro plan ceilings to predict upsell triggers.
  - name: Allocation
    description: Allocate Sideko cost to the platform/devex team that owns SDK and documentation generation;
      attribute additional-language fees to the consuming product team requesting that SDK.
  - name: Optimization
    description: Consolidate APIs and doc projects under the Pro tier ceilings (10 APIs, 5 doc projects)
      before triggering Enterprise; only add a paid SDK language when there is real consumer demand.
  - name: Accountability
    description: Developer experience or platform engineering owns Sideko renewal; product owners approve
      additional-SDK-language requests since each adds $400/month.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

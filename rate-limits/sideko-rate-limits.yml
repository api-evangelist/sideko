description: Sideko's pricing page does not document specific API rate limits, burst allowances, or
  response codes. Plan-level entitlements (SDK languages, APIs, doc projects) act as quotas; raw API
  rate limits would need to be confirmed via support or an OpenAPI document.
sources:
  - https://sideko.dev/pricing
notes: No public rate-limit specification was found on Sideko's pricing or docs pages. Reconciliation
  pending direct documentation or vendor confirmation.
responseCodes:
  throttled: 429
limits:
  - name: API requests
    scope: account
    metric: requests
    limit: not publicly documented
    notes: Plan tier governs SDK languages, API count, and doc projects; raw per-second/minute API
      rate limits are not published.
policies:
  - name: Plan-Based Quotas
    description: Quotas scale by plan (Starter, Pro, Enterprise) on SDK languages, API count, and doc
      projects rather than via per-call rate limits.

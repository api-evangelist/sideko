description: >-
  Sideko is an API tooling generation platform that uses OpenAPI Specifications
  to create SDKs, documentation sites, CLIs, and mock servers. The platform
  enables organizations to offer a complete suite of API developer tools without
  writing code, as Sideko generates the tooling automatically from OpenAPI specs.
  Sideko serves some of the largest organizations in the world, helping improve
  API developer experience at scale.
